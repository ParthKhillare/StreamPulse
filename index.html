
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="StreamPulse Analytics - Netflix-Style Analytics Dashboard with React and TypeScript">
    <title>StreamPulse Analytics | Netflix-Style Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }
        #root {
            width: 100%;
            height: 100vh;
        }
        .loading-fallback {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top: 4px solid #e50914;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
    </style>
    <link rel="stylesheet" href="/index.css">
</head>
<body class="bg-black text-white">
    <div id="root">
        <!-- Fallback loading state -->
        <div class="loading-fallback">
            <div style="text-align: center;">
                <div class="loading-spinner"></div>
                <h2 style="color: #fff; margin: 0 0 10px;">StreamPulse Analytics</h2>
                <p style="color: #999; margin: 0;">Loading Netflix-style dashboard...</p>
            </div>
        </div>
    </div>
    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
